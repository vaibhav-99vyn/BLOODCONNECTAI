<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood Bank Login — BloodConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>🏦 BloodConnect</h1>
        <p>Blood Bank Portal</p>
      </div>
      <h2>Blood Bank Login</h2>
      <div id="msg"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="bloodbank@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="login()">Login</button>

      <hr class="divider"/>
      <p style="font-size:0.85rem;color:var(--gray-400);margin-bottom:0.8rem;text-align:center;">New Blood Bank? Register</p>
      <button class="btn btn-secondary btn-full" onclick="document.getElementById('regForm').style.display='block'">➕ Register Blood Bank</button>

      <div id="regForm" style="display:none;margin-top:1.5rem;">
        <h2 style="font-size:1.4rem;margin-bottom:1rem;">Blood Bank Registration</h2>
        <div class="form-group"><label>Blood Bank Name</label><input type="text" id="r_name" placeholder="LifeLine Blood Bank" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="r_email" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="r_password" /></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="r_phone" /></div>
        <div class="form-group"><label>Full Address</label><input type="text" id="r_address" placeholder="456 Park Ave, City, State" /></div>
        <div class="form-row">
          <div class="form-group"><label>Latitude</label><input type="number" id="r_lat" placeholder="e.g. 19.2183" step="any" /></div>
          <div class="form-group"><label>Longitude</label><input type="number" id="r_lng" placeholder="e.g. 72.9781" step="any" /></div>
        </div>
        <small style="color:var(--gray-400);display:block;margin-bottom:1rem;">Find lat/lng at maps.google.com → right-click your location</small>
        <button class="btn btn-primary btn-full" onclick="registerBank()">Register</button>
      </div>

      <div class="auth-switch" style="margin-top:1rem;"><a href="index.html" style="color:var(--gray-400);">← Back to Home</a></div>
    </div>
  </div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    DB.init();
    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) { showMsg('error', 'Please fill in both fields.'); return; }
      const result = Auth.login(email, password);
      if (!result.success) { showMsg('error', result.message); return; }
      if (result.user.role !== 'bloodbank') { showMsg('error', 'This login is for blood banks only.'); return; }
      window.location.href = 'bloodbank-dashboard.html';
    }
    function registerBank() {
      const name = document.getElementById('r_name').value.trim();
      const email = document.getElementById('r_email').value.trim();
      const password = document.getElementById('r_password').value.trim();
      const phone = document.getElementById('r_phone').value.trim();
      const address = document.getElementById('r_address').value.trim();
      const lat = parseFloat(document.getElementById('r_lat').value) || 19.2183;
      const lng = parseFloat(document.getElementById('r_lng').value) || 72.9781;
      if (!name || !email || !password || !phone || !address) { showMsg('error', 'Please fill all fields.'); return; }
      const result = Auth.register({ role: 'bloodbank', name, email, password, phone, address, lat, lng });
      if (!result.success) { showMsg('error', result.message); return; }
      showMsg('success', 'Blood Bank registered! Logging in...');
      setTimeout(() => { Auth.login(email, password); window.location.href = 'bloodbank-dashboard.html'; }, 1200);
    }
    function showMsg(type, text) {
      document.getElementById('msg').innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${text}</div>`;
    }
  </script>
</body>
</html>
