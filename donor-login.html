<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Login — BloodConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>🩸 BloodConnect</h1>
        <p>Donor Portal</p>
      </div>
      <h2>Donor Login</h2>
      <div id="msg"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="donor@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="login()">Login</button>
      <div class="auth-switch">
        Don't have an account? <a href="donor-register.html">Register here</a>
      </div>
      <div class="auth-switch" style="margin-top:8px;">
        <a href="index .html" style="color:var(--gray-400);">← Back to Home</a>
      </div>
    </div>
  </div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script>
    DB.init();
    function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!email || !password) { showMsg('error', 'Please fill in both fields.'); return; }
      const result = Auth.login(email, password);
      if (!result.success) { showMsg('error', result.message); return; }
      if (result.user.role !== 'donor') { showMsg('error', 'This login is for donors only.'); return; }
      window.location.href = 'donor-dashboard.html';
    }
    function showMsg(type, text) {
      document.getElementById('msg').innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${text}</div>`;
    }
  </script>
</body>
</html>
