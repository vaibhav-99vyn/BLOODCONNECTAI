<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Dashboard — BloodConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">🩸 <span>Blood</span>Connect</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="live-network-map.html">🌐 Live Network</a>
      <a href="donor-health-passport.html">🧾 Donor Passport</a>
      <a href="blood-expiry-tracker.html">⏳ Expiry Tracker</a>
      <button class="logout-btn" onclick="Auth.logout()">Logout</button>
    </div>
  </nav>

  <div class="page" id="app">
    <div style="text-align:center;padding:3rem;"><div class="spinner"></div></div>
  </div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="emergency.js"></script>
  <script>
    DB.init();
    const user = Auth.requireAuth('donor');
    if (!user) throw new Error('Not authenticated');

    function renderDashboard() {
      const fresh = DB.getUserById(user.id);
      const donations = DB.getDonationsByDonor(user.id);

      // Can donate? (Must wait 3 months after last donation)
      let canDonate = true;
      let cooldownMsg = '';
      if (fresh.lastDonated) {
        const lastDate = new Date(fresh.lastDonated);
        const nextDate = new Date(lastDate.getTime() + 90 * 24 * 60 * 60 * 1000);
        if (new Date() < nextDate) {
          canDonate = false;
          cooldownMsg = `Next donation eligible: ${nextDate.toLocaleDateString()}`;
        }
      }

      // Get hospitals and blood banks
      const hospitals = DB.getUsersByRole('hospital');
      const banks = DB.getUsersByRole('bloodbank');

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="dash-header">
          <div>
            <h1>Donor Dashboard</h1>
            <p>Welcome back, ${fresh.name}!</p>
          </div>
          <div class="user-pill">
            🩸 ${fresh.bloodGroup} &nbsp;|&nbsp; 
            <span style="color:${fresh.available ? '#22C55E' : '#F59E0B'}">${fresh.available ? '● Available' : '○ Unavailable'}</span>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${donations.length}</div>
            <div class="stat-label">Total Donations</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${fresh.bloodGroup}</div>
            <div class="stat-label">Blood Group</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${fresh.lastDonated ? new Date(fresh.lastDonated).toLocaleDateString() : '—'}</div>
            <div class="stat-label">Last Donated</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:${canDonate ? 'var(--success)' : 'var(--warning)'};">${canDonate ? 'YES' : 'NO'}</div>
            <div class="stat-label">Can Donate Now</div>
          </div>
        </div>

        ${!canDonate ? `<div class="alert alert-warning">⏰ ${cooldownMsg} (90 days between donations)</div>` : ''}

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('donate', this)">🩸 Donate Blood</button>
          <button class="tab-btn" onclick="switchTab('history', this)">📋 My Donations</button>
          <button class="tab-btn" onclick="switchTab('profile', this)">👤 Profile</button>
        </div>

        <!-- DONATE TAB -->
        <div class="tab-panel active" id="tab-donate">
          <div class="card">
            <div class="card-title">🏥 Record Your Donation</div>
            ${!canDonate ? `<div class="alert alert-warning">You cannot donate yet. ${cooldownMsg}</div>` : ''}
            <div class="form-group">
              <label>Donate To</label>
              <select id="receiverType" onchange="populateReceivers()">
                <option value="hospital">Hospital</option>
                <option value="bloodbank">Blood Bank</option>
              </select>
            </div>
            <div class="form-group">
              <label>Select Hospital / Blood Bank</label>
              <select id="receiverId"></select>
            </div>
            <div class="form-group">
              <label>Blood Group (Your blood: ${fresh.bloodGroup})</label>
              <input type="text" value="${fresh.bloodGroup}" readonly style="background:var(--gray-100);" />
            </div>
            <div class="form-group">
              <label>Units to Donate</label>
              <select id="units">
                <option value="1">1 Unit</option>
                <option value="2">2 Units</option>
              </select>
            </div>
            <div class="form-group">
              <label>Date of Donation</label>
              <input type="date" id="donationDate" value="${new Date().toISOString().split('T')[0]}" />
            </div>
            <div class="form-group">
              <label>Notes (Optional)</label>
              <input type="text" id="notes" placeholder="Any additional info" />
            </div>
            <button class="btn btn-primary" onclick="recordDonation()" ${!canDonate ? 'disabled style="opacity:0.5"' : ''}>✅ Record Donation</button>
          </div>
        </div>

        <!-- HISTORY TAB -->
        <div class="tab-panel" id="tab-history">
          <div class="card">
            <div class="card-title">📋 My Donation History</div>
            ${donations.length === 0 ? `<div class="empty-state"><div class="empty-icon">🩸</div><p>No donations recorded yet.</p></div>` : `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Donated To</th><th>Blood Group</th><th>Units</th><th>Notes</th></tr></thead>
                <tbody>
                  ${donations.map(d => `<tr>
                    <td>${new Date(d.createdAt).toLocaleDateString()}</td>
                    <td>${d.receiverName}</td>
                    <td><span class="badge badge-red">${d.bloodGroup}</span></td>
                    <td>${d.units}</td>
                    <td>${d.notes || '—'}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
        </div>

        <!-- PROFILE TAB -->
        <div class="tab-panel" id="tab-profile">
          <div class="card">
            <div class="card-title">👤 My Profile</div>
            <div class="form-row">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="p_name" value="${fresh.name}" />
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="p_phone" value="${fresh.phone || ''}" />
              </div>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="p_address" value="${fresh.address || ''}" />
            </div>
            <div class="form-group">
              <label>Available to Donate?</label>
              <select id="p_available">
                <option value="true" ${fresh.available ? 'selected' : ''}>Yes — I'm available</option>
                <option value="false" ${!fresh.available ? 'selected' : ''}>No — Not available now</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="updateProfile()">💾 Save Profile</button>
            <div id="profile-msg" style="margin-top:1rem;"></div>
          </div>
        </div>
      `;

      populateReceivers();
    }

    function populateReceivers() {
      const type = document.getElementById('receiverType').value;
      const receivers = type === 'hospital' ? DB.getUsersByRole('hospital') : DB.getUsersByRole('bloodbank');
      const sel = document.getElementById('receiverId');
      sel.innerHTML = receivers.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    }

    function recordDonation() {
      const receiverId = document.getElementById('receiverId').value;
      const units = parseInt(document.getElementById('units').value);
      const notes = document.getElementById('notes').value;
      const date = document.getElementById('donationDate').value;

      const receiver = DB.getUserById(receiverId);
      if (!receiver) { alert('Please select a valid receiver.'); return; }

      const donation = DB.addDonation({
        donorId: user.id,
        donorName: user.name,
        receiverId,
        receiverName: receiver.name,
        receiverType: receiver.role,
        bloodGroup: user.bloodGroup,
        units,
        notes,
        donationDate: date
      });

      alert(`✅ Donation recorded! ${units} unit(s) of ${user.bloodGroup} added to ${receiver.name}.`);
      renderDashboard();
    }

    function updateProfile() {
      DB.updateUser(user.id, {
        name: document.getElementById('p_name').value.trim(),
        phone: document.getElementById('p_phone').value.trim(),
        address: document.getElementById('p_address').value.trim(),
        available: document.getElementById('p_available').value === 'true'
      });
      // Update session
      const updated = DB.getUserById(user.id);
      sessionStorage.setItem('bms_current_user', JSON.stringify(updated));
      document.getElementById('profile-msg').innerHTML = '<div class="alert alert-success">✅ Profile updated!</div>';
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    renderDashboard();
  </script>
</body>
</html>
