<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — BloodConnect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="brand">🩸 <span>Blood</span>Connect</div>
    <div class="nav-links">
      <a href="index .html">Home</a>
      <a href="live-network-map.html">🌐 Live Network</a>
      <a href="donor-health-passport.html">🧾 Donor Passport</a>
      <a href="blood-expiry-tracker.html">⏳ Expiry Tracker</a>
      <a href="ai-demo.html">🤖 AI Demo</a>
      <button class="logout-btn" onclick="Auth.logout()">Logout</button>
    </div>
  </nav>

  <div id="toast-container" class="toast-container"></div>

  <!-- ADMIN LOGIN GATE -->
  <div id="loginGate" class="auth-page" style="display:flex;">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>🛡️ BloodConnect</h1>
        <p>Admin Portal</p>
      </div>
      <h2>Admin Login</h2>
      <div id="admin-msg"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="admin_email" value="admin@blood.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin_password" value="admin123" />
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="adminLogin()">Login as Admin</button>
      <div class="auth-switch" style="margin-top:1rem;"><a href="index .html" style="color:var(--gray-400);">← Back to Home</a></div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDash" class="page-wide" style="display:none;"></div>

  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="emergency.js"></script>
  <script src="ai-predictor.js"></script>
  <script>
    DB.init();

    // Always show login gate for admin dashboard (security)
    // Check if already logged in and redirect to dashboard if so
    const currentUser = Auth.getCurrentUser();
    if (currentUser && currentUser.role === 'admin') {
      // User is already logged in, show dashboard directly
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminDash').style.display = 'block';
      renderAdmin();
      setInterval(renderAdmin, 10000); // Keep admin view synced every 10s
    }
    // Otherwise, login gate remains visible (display:flex by default)

    function adminLogin() {
      const email = document.getElementById('admin_email').value.trim();
      const password = document.getElementById('admin_password').value.trim();

      // Ensure admin user exists
      let adminUser = DB.getUserByEmail('admin@blood.com');
      if (!adminUser) {
        // Create admin user if not exists
        const adminData = {
          id: 'admin-001',
          role: 'admin',
          name: 'System Admin',
          email: 'admin@blood.com',
          password: 'admin123',
          createdAt: new Date().toISOString()
        };
        const users = DB.getUsers();
        users.push(adminData);
        DB.set('users', users);
        adminUser = adminData;
      }

      // Check credentials
      if (email === 'admin@blood.com' && password === 'admin123') {
        sessionStorage.setItem('bms_current_user', JSON.stringify(adminUser));
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('adminDash').style.display = 'block';
        renderAdmin();
        setInterval(renderAdmin, 10000);
        return;
      }

      showLoginMsg('error', 'Invalid credentials');
    }

    const BLOOD_GROUPS = ['A+','A-','B+','B-','O+','O-','AB+','AB-'];
    let lastAdminExpiryAlert = null;

    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function syncAdmin() {
      renderAdmin();
      showToast('🔄 Admin sync complete', 'success');
    }

    function renderAdmin() {
      const stats = DB.getStats();
      const donors = DB.getUsersByRole('donor');
      const patients = DB.getUsersByRole('patient');
      const hospitals = DB.getUsersByRole('hospital');
      const banks = DB.getUsersByRole('bloodbank');
      const allStock = DB.getStock();
      const requests = DB.getRequests();
      const emergencies = DB.getEmergencies();
      const donations = DB.getDonations();

      const expiryReports = DB.getStockExpiryReports();
      const expiryTotals = { critical: 0, warning: 0, safe: 0, expired: 0, unknown: 0 };
      expiryReports.forEach(s => { if (expiryTotals[s.status] !== undefined) expiryTotals[s.status] += s.units; });

      const adminAlertLevel = expiryTotals.critical > 0 ? 'error' : expiryTotals.warning > 0 ? 'warning' : 'success';
      if (adminAlertLevel !== lastAdminExpiryAlert) {
        if (adminAlertLevel === 'error') showToast(`🚨 ${expiryTotals.critical} critical units expiry across network`, 'error');
        else if (adminAlertLevel === 'warning') showToast(`⚠️ ${expiryTotals.warning} units near expiry across network`, 'warning');
        lastAdminExpiryAlert = adminAlertLevel;
      }

      const expiryList = DB.getStockExpiryReports();
      const expiryTotals = { critical: 0, warning: 0, safe: 0, expired: 0, unknown: 0 };
      expiryList.forEach(s => { if (expiryTotals[s.status] !== undefined) expiryTotals[s.status] += s.units; });

      const dash = document.getElementById('adminDash');
      dash.innerHTML = `
        <div class="dash-header">
          <div>
            <h1>🛡️ Admin Dashboard</h1>
            <p>Complete system overview — BloodConnect Management System</p>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <button class="btn btn-secondary btn-sm" onclick="syncAdmin()">🔄 Force Sync</button>
            <div class="user-pill">👤 System Admin</div>
          </div>
        </div>

        <!-- QUICK STATS -->
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${stats.totalUnits}</div><div class="stat-label">Total Blood Units</div></div>
          <div class="stat-card"><div class="stat-value">${stats.totalDonors}</div><div class="stat-label">Registered Donors</div></div>
          <div class="stat-card"><div class="stat-value">${stats.totalPatients}</div><div class="stat-label">Registered Patients</div></div>
          <div class="stat-card"><div class="stat-value">${stats.totalHospitals}</div><div class="stat-label">Hospitals</div></div>
          <div class="stat-card"><div class="stat-value">${stats.totalBloodBanks}</div><div class="stat-label">Blood Banks</div></div>
          <div class="stat-card"><div class="stat-value">${stats.totalDonations}</div><div class="stat-label">Total Donations</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--warning);">${stats.pendingRequests}</div><div class="stat-label">Pending Requests</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--red);">${stats.activeEmergencies}</div><div class="stat-label">Active Emergencies</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--red);">${expiryTotals.critical}</div><div class="stat-label">Critical Expiry Units</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--warning);">${expiryTotals.warning}</div><div class="stat-label">Warning Expiry Units</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--success);">${expiryTotals.safe}</div><div class="stat-label">Safe Expiry Units</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--gray-500);">${expiryTotals.expired}</div><div class="stat-label">Expired Units</div></div>
        </div>

        <!-- ACTIVE EMERGENCIES BANNER -->
        ${stats.activeEmergencies > 0 ? `
        <div class="emergency-card">
          <div class="emg-header"><div class="pulse-dot"></div><strong>⚠️ ${stats.activeEmergencies} ACTIVE EMERGENCY REQUEST(S)</strong></div>
          <p style="font-size:0.9rem;color:var(--red-dark);">Scroll to Emergency Requests tab for details.</p>
        </div>` : ''}

        <div class="tabs" style="flex-wrap:wrap;">
          <button class="tab-btn active" onclick="switchTab('overview', this)">📊 Overview</button>
          <button class="tab-btn" onclick="switchTab('donors', this)">🩸 Donors</button>
          <button class="tab-btn" onclick="switchTab('patients', this)">🏥 Patients</button>
          <button class="tab-btn" onclick="switchTab('hospitals', this)">🏨 Hospitals</button>
          <button class="tab-btn" onclick="switchTab('banks', this)">🏦 Blood Banks</button>
          <button class="tab-btn" onclick="switchTab('stock', this)">📦 All Stock</button>
          <button class="tab-btn" onclick="switchTab('requests', this)">📋 Requests</button>
          <button class="tab-btn" onclick="switchTab('emergencies', this)">🚨 Emergencies</button>
          <button class="tab-btn" onclick="switchTab('donations', this)">💉 Donations</button>
          <button class="tab-btn" onclick="switchTab('ai-predictions', this)">🤖 AI Predictions</button>
        </div>

        <!-- OVERVIEW TAB -->
        <div class="tab-panel active" id="tab-overview">
          <div class="card">
            <div class="card-title">📊 System-wide Blood Stock Summary</div>
            <div class="blood-grid">
              ${BLOOD_GROUPS.map(bg => {
                const units = stats.stockByGroup[bg] || 0;
                const cls = units === 0 ? 'critical' : units <= 5 ? 'low' : 'good';
                const status = units === 0 ? 'CRITICAL' : units <= 5 ? 'LOW' : 'SUFFICIENT';
                return `<div class="blood-card ${cls}">
                  <div class="bg-label">${bg}</div>
                  <div class="bg-units">${units} units</div>
                  <div class="bg-status">${status}</div>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div class="grid-2" style="margin-top:1.5rem;">
            <div class="card">
              <div class="card-title">📋 Request Summary</div>
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;justify-content:space-between;"><span>Total Requests</span><strong>${stats.totalRequests}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>Pending</span><strong style="color:var(--warning);">${stats.pendingRequests}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>Fulfilled</span><strong style="color:var(--success);">${stats.fulfilledRequests}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>Active Emergencies</span><strong style="color:var(--red);">${stats.activeEmergencies}</strong></div>
              </div>
            </div>
            <div class="card">
              <div class="card-title">💉 Donation Summary</div>
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:flex;justify-content:space-between;"><span>Total Donations</span><strong>${stats.totalDonations}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>Active Donors</span><strong style="color:var(--success);">${donors.filter(d => d.available).length}</strong></div>
                <div style="display:flex;justify-content:space-between;"><span>Unavailable Donors</span><strong style="color:var(--gray-400);">${donors.filter(d => !d.available).length}</strong></div>
              </div>
            </div>
          </div>
        </div>

        <!-- DONORS TAB -->
        <div class="tab-panel" id="tab-donors">
          <div class="card">
            <div class="card-title">🩸 All Registered Donors (${donors.length})</div>
            ${donors.length === 0 ? `<div class="empty-state"><div class="empty-icon">🩸</div><p>No donors yet.</p></div>` : `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Email</th><th>Blood Group</th><th>Phone</th><th>Address</th><th>Available</th><th>Last Donated</th><th>Action</th></tr></thead>
                <tbody>
                  ${donors.map(d => `<tr>
                    <td>${d.name}</td>
                    <td>${d.email}</td>
                    <td><span class="badge badge-red">${d.bloodGroup}</span></td>
                    <td>${d.phone || '—'}</td>
                    <td>${d.address || '—'}</td>
                    <td><span class="badge badge-${d.available ? 'green' : 'yellow'}">${d.available ? 'Yes' : 'No'}</span></td>
                    <td>${d.lastDonated ? new Date(d.lastDonated).toLocaleDateString() : 'Never'}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${d.id}')">🗑️</button></td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
        </div>

        <!-- PATIENTS TAB -->
        <div class="tab-panel" id="tab-patients">
          <div class="card">
            <div class="card-title">🏥 All Registered Patients (${patients.length})</div>
            ${patients.length === 0 ? `<div class="empty-state"><div class="empty-icon">🏥</div><p>No patients yet.</p></div>` : `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Email</th><th>Blood Group</th><th>Phone</th><th>Address</th><th>Registered</th><th>Action</th></tr></thead>
                <tbody>
                  ${patients.map(p => `<tr>
                    <td>${p.name}</td>
                    <td>${p.email}</td>
                    <td><span class="badge badge-red">${p.bloodGroup || '—'}</span></td>
                    <td>${p.phone || '—'}</td>
                    <td>${p.address || '—'}</td>
                    <td>${new Date(p.createdAt).toLocaleDateString()}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${p.id}')">🗑️</button></td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
        </div>

        <!-- HOSPITALS TAB -->
        <div class="tab-panel" id="tab-hospitals">
          <div class="card">
            <div class="card-title">🏨 All Hospitals (${hospitals.length})</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Lat</th><th>Lng</th></tr></thead>
                <tbody>
                  ${hospitals.map(h => `<tr>
                    <td>${h.name}</td>
                    <td>${h.email}</td>
                    <td>${h.phone || '—'}</td>
                    <td>${h.address || '—'}</td>
                    <td>${h.lat || '—'}</td>
                    <td>${h.lng || '—'}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- BLOOD BANKS TAB -->
        <div class="tab-panel" id="tab-banks">
          <div class="card">
            <div class="card-title">🏦 All Blood Banks (${banks.length})</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Lat</th><th>Lng</th></tr></thead>
                <tbody>
                  ${banks.map(b => `<tr>
                    <td>${b.name}</td>
                    <td>${b.email}</td>
                    <td>${b.phone || '—'}</td>
                    <td>${b.address || '—'}</td>
                    <td>${b.lat || '—'}</td>
                    <td>${b.lng || '—'}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ALL STOCK TAB -->
        <div class="tab-panel" id="tab-stock">
          <div class="card">
            <div class="card-title">📦 All Blood Stock by Source</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Source</th><th>Type</th><th>Blood Group</th><th>Units</th><th>Status</th><th>Last Updated</th></tr></thead>
                <tbody>
                  ${allStock.map(s => {
                    const cls = s.units === 0 ? 'badge-red' : s.units <= 5 ? 'badge-yellow' : 'badge-green';
                    const status = s.units === 0 ? 'Critical' : s.units <= 5 ? 'Low' : 'Good';
                    return `<tr>
                      <td>${s.ownerName}</td>
                      <td><span class="badge badge-blue">${s.ownerType}</span></td>
                      <td><span class="badge badge-red">${s.bloodGroup}</span></td>
                      <td>${s.units}</td>
                      <td><span class="badge ${cls}">${status}</span></td>
                      <td>${new Date(s.lastUpdated).toLocaleDateString()}</td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- REQUESTS TAB -->
        <div class="tab-panel" id="tab-requests">
          <div class="card">
            <div class="card-title">📋 All Blood Requests (${requests.length})</div>
            ${requests.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><p>No requests yet.</p></div>` : `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Patient</th><th>Blood Group</th><th>Units</th><th>Urgency</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
                <tbody>
                  ${[...requests].reverse().map(r => `<tr>
                    <td>${r.patientName}</td>
                    <td><span class="badge badge-red">${r.bloodGroup}</span></td>
                    <td>${r.units}</td>
                    <td><span class="badge badge-${r.urgency === 'emergency' ? 'red' : r.urgency === 'urgent' ? 'yellow' : 'blue'}">${r.urgency}</span></td>
                    <td><span class="badge badge-${r.status === 'fulfilled' ? 'green' : r.status === 'pending' ? 'yellow' : 'gray'}">${r.status}</span></td>
                    <td>${new Date(r.createdAt).toLocaleDateString()}</td>
                    <td>
                      ${r.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="fulfillRequest('${r.id}')">✅ Fulfill</button>` : ''}
                    </td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
        </div>

        <!-- EMERGENCIES TAB -->
        <div class="tab-panel" id="tab-emergencies">
          <div class="card">
            <div class="card-title">🚨 All Emergency Requests (${emergencies.length})</div>
            ${emergencies.length === 0 ? `<div class="empty-state"><div class="empty-icon">🚨</div><p>No emergency requests yet.</p></div>` :
              [...emergencies].reverse().map(e => `
              <div class="${e.status === 'active' ? 'emergency-card' : 'card'}" style="margin-bottom:1rem;">
                ${e.status === 'active' ? `<div class="emg-header"><div class="pulse-dot"></div><strong>🚨 ACTIVE EMERGENCY</strong></div>` : ''}
                <div style="font-size:0.9rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem 1rem;flex-wrap:wrap;">
                  <div><strong>Patient:</strong> ${e.patientName}</div>
                  <div><strong>Blood Group:</strong> <span class="badge badge-red">${e.bloodGroup}</span></div>
                  <div><strong>Units:</strong> ${e.unitsNeeded}</div>
                  <div><strong>Status:</strong> <span class="badge badge-${e.status === 'active' ? 'red' : 'green'}">${e.status}</span></div>
                  <div><strong>Contact:</strong> ${e.patientPhone || 'N/A'}</div>
                  <div><strong>Email:</strong> ${e.patientEmail}</div>
                  <div><strong>Time:</strong> ${new Date(e.createdAt).toLocaleString()}</div>
                  <div><strong>Alerted:</strong> ${(e.sourcesAlerted || []).map(s => s.name).join(', ') || 'None'}</div>
                </div>
                ${e.status === 'active' ? `<button class="btn btn-success btn-sm" style="margin-top:0.75rem;" onclick="resolveEmergency('${e.id}')">✅ Resolve Emergency</button>` : ''}
              </div>`).join('')
            }
          </div>
        </div>

        <!-- DONATIONS TAB -->
        <div class="tab-panel" id="tab-donations">
          <div class="card">
            <div class="card-title">💉 All Donations (${donations.length})</div>
            ${donations.length === 0 ? `<div class="empty-state"><div class="empty-icon">💉</div><p>No donations recorded yet.</p></div>` : `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Donor</th><th>Donated To</th><th>Type</th><th>Blood Group</th><th>Units</th></tr></thead>
                <tbody>
                  ${[...donations].reverse().map(d => `<tr>
                    <td>${new Date(d.createdAt).toLocaleDateString()}</td>
                    <td>${d.donorName}</td>
                    <td>${d.receiverName}</td>
                    <td><span class="badge badge-blue">${d.receiverType}</span></td>
                    <td><span class="badge badge-red">${d.bloodGroup}</span></td>
                    <td>${d.units}</td>
                  </tr>`).join('')}
                </tbody>
              </table>
            </div>`}
          </div>
        </div>

        <!-- AI PREDICTIONS TAB -->
        <div class="tab-panel" id="tab-ai-predictions">
          <div class="card">
            <div class="card-title">🤖 AI-Powered Blood Demand Predictions</div>
            <p style="font-size:0.9rem;color:var(--gray-400);margin-bottom:1rem;">Machine learning predictions for blood demand with emergency response optimization.</p>

            <div style="display:flex;gap:1rem;margin-bottom:1.5rem;">
              <button class="btn btn-primary" onclick="generatePredictions()">🔮 Generate Predictions</button>
              <button class="btn btn-secondary" onclick="showEmergencyOptimization()">🚨 Emergency Optimization</button>
            </div>

            <div id="predictions-container">
              <div class="empty-state">
                <div class="empty-icon">🤖</div>
                <p>Click "Generate Predictions" to see AI-powered blood demand forecasts.</p>
              </div>
            </div>
          </div>
        </div>

        <!-- RESET SECTION -->
        <div class="card" style="margin-top:2rem;border-top:3px solid var(--red);">
          <div class="card-title">⚙️ System Management</div>
          <p style="font-size:0.9rem;color:var(--gray-400);margin-bottom:1rem;">Admin tools for system management.</p>
          <div style="display:flex;gap:1rem;flex-wrap:wrap;">
            <button class="btn btn-secondary" onclick="refreshPage()">🔄 Refresh Data</button>
            <button class="btn btn-danger" onclick="resetSystem()">⚠️ Reset All Data</button>
          </div>
        </div>
      `;
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    }

    function deleteUser(id) {
      if (!confirm('Delete this user? This cannot be undone.')) return;
      const users = DB.getUsers().filter(u => u.id !== id);
      DB.set('users', users);
      renderAdmin();
    }

    function fulfillRequest(id) {
      DB.updateRequest(id, { status: 'fulfilled', fulfilledBy: 'admin', fulfilledAt: new Date().toISOString() });
      alert('✅ Request marked as fulfilled.');
      renderAdmin();
    }

    function resolveEmergency(id) {
      DB.updateEmergency(id, { status: 'resolved', resolvedAt: new Date().toISOString() });
      alert('✅ Emergency resolved.');
      renderAdmin();
    }

    function refreshPage() {
      renderAdmin();
      alert('✅ Data refreshed!');
    }

    function resetSystem() {
      if (!confirm('⚠️ This will delete ALL data and reset to demo data. Continue?')) return;
      localStorage.removeItem('bms_initialized');
      Object.keys(localStorage).filter(k => k.startsWith('bms_')).forEach(k => localStorage.removeItem(k));
      DB.init();
      alert('✅ System reset to demo data.');
      renderAdmin();
    }

    // AI PREDICTIONS FUNCTIONS
    function generatePredictions() {
      const predictions = AIPredictor.getSystemPredictions();
      const container = document.getElementById('predictions-container');

      container.innerHTML = `
        <div class="card">
          <div class="card-title">📈 3-Day Blood Demand Forecast</div>
          <p style="font-size:0.9rem;color:var(--gray-400);margin-bottom:1rem;">AI-powered predictions based on historical data, seasonal patterns, and current trends.</p>

          <div class="blood-grid" style="margin-bottom:2rem;">
            ${Object.keys(predictions).map(group => {
              const todayPred = predictions[group].find(p => p.day === new Date().toLocaleDateString('en-US', { weekday: 'short' }));
              const tomorrowPred = predictions[group].find(p => {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                return p.day === tomorrow.toLocaleDateString('en-US', { weekday: 'short' });
              });
              const dayAfterPred = predictions[group].find(p => {
                const dayAfter = new Date();
                dayAfter.setDate(dayAfter.getDate() + 2);
                return p.day === dayAfter.toLocaleDateString('en-US', { weekday: 'short' });
              });

              return `
                <div class="blood-card ${todayPred?.predictedDemand > 8 ? 'critical' : todayPred?.predictedDemand > 5 ? 'low' : 'good'}">
                  <div class="bg-label">${group}</div>
                  <div class="bg-units">Today: ${todayPred?.predictedDemand || 0}</div>
                  <div class="bg-units" style="font-size:0.8rem;">Tomorrow: ${tomorrowPred?.predictedDemand || 0}</div>
                  <div class="bg-units" style="font-size:0.8rem;">Day After: ${dayAfterPred?.predictedDemand || 0}</div>
                  <div class="bg-status">${todayPred?.confidence || 0}% confidence</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="card-title">📊 Detailed 7-Day Forecast</div>
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;">
              <thead>
                <tr style="background:var(--gray-100);">
                  <th style="padding:8px;border:1px solid var(--gray-200);">Blood Group</th>
                  ${Array.from({length: 7}, (_, i) => {
                    const date = new Date();
                    date.setDate(date.getDate() + i);
                    return `<th style="padding:8px;border:1px solid var(--gray-200);">${date.toLocaleDateString('en-US', { weekday: 'short' })}<br/>${date.getDate()}/${date.getMonth()+1}</th>`;
                  }).join('')}
                </tr>
              </thead>
              <tbody>
                ${Object.keys(predictions).map(group => `
                  <tr>
                    <td style="padding:8px;border:1px solid var(--gray-200);font-weight:bold;">${group}</td>
                    ${predictions[group].map(pred => `
                      <td style="padding:8px;border:1px solid var(--gray-200);text-align:center;${pred.predictedDemand > 8 ? 'background:#ffebee;color:#c62828;' : pred.predictedDemand > 5 ? 'background:#fff3e0;color:#ef6c00;' : 'background:#e8f5e8;color:#2e7d32;'}">
                        ${pred.predictedDemand}<br/>
                        <small style="font-size:0.7rem;">${pred.confidence}%</small>
                      </td>
                    `).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>

          <div style="margin-top:1.5rem;padding:1rem;background:var(--gray-50);border-radius:8px;">
            <h4 style="margin:0 0 0.5rem 0;color:var(--primary);">🤖 AI Insights</h4>
            <ul style="margin:0;padding-left:1.2rem;font-size:0.9rem;">
              <li>Predictions account for seasonal patterns, weekly cycles, and historical trends</li>
              <li>Red cells indicate high demand (>8 units) - consider pre-positioning stock</li>
              <li>Orange cells indicate moderate demand (6-8 units) - monitor closely</li>
              <li>Green cells indicate normal demand (≤5 units) - standard operations</li>
              <li>Confidence levels decrease for longer-term predictions</li>
            </ul>
          </div>
        </div>
      `;
    }

    function showEmergencyOptimization() {
      const optimizations = AIPredictor.getEmergencyOptimizations();
      const container = document.getElementById('predictions-container');

      if (optimizations.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✅</div>
            <p>No active emergencies to optimize. All systems operating normally.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="card">
          <div class="card-title">🚨 Emergency Response Optimization</div>
          <p style="font-size:0.9rem;color:var(--gray-400);margin-bottom:1rem;">AI-powered optimization for active emergency blood requests.</p>

          ${optimizations.map(opt => `
            <div class="emergency-card" style="margin-bottom:1.5rem;">
              <div class="emg-header">
                <div class="pulse-dot"></div>
                <strong>🚨 ${opt.emergency.bloodGroup} Emergency at ${opt.emergency.location}</strong>
                <span style="float:right;">${opt.strategy.successProbability}% Success Rate</span>
              </div>

              <div style="margin-top:1rem;">
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1rem;">
                  <div style="padding:0.5rem;background:var(--gray-50);border-radius:4px;">
                    <strong>Primary Action:</strong><br/>
                    ${opt.strategy.primaryAction.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}
                  </div>
                  <div style="padding:0.5rem;background:var(--gray-50);border-radius:4px;">
                    <strong>Est. Response Time:</strong><br/>
                    ${opt.strategy.estimatedTime} minutes
                  </div>
                  <div style="padding:0.5rem;background:var(--gray-50);border-radius:4px;">
                    <strong>Compatible Donors:</strong><br/>
                    ${opt.compatibleDonors.length} available
                  </div>
                  <div style="padding:0.5rem;background:var(--gray-50);border-radius:4px;">
                    <strong>Nearby Blood Banks:</strong><br/>
                    ${opt.nearbyBanks.length} with stock
                  </div>
                </div>

                <div style="margin-bottom:1rem;">
                  <strong>🤖 AI Recommendations:</strong>
                  <ul style="margin:0.5rem 0;padding-left:1.2rem;">
                    ${opt.strategy.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                  </ul>
                </div>

                ${opt.compatibleDonors.length > 0 ? `
                  <div style="margin-bottom:1rem;">
                    <strong>👥 Top Compatible Donors:</strong>
                    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
                      ${opt.compatibleDonors.slice(0, 5).map(donor => `
                        <div style="padding:0.3rem 0.6rem;background:#e3f2fd;border-radius:4px;font-size:0.8rem;">
                          ${donor.name} (${donor.distance}km, ${donor.compatibility}% match)
                        </div>
                      `).join('')}
                    </div>
                  </div>
                ` : ''}

                ${opt.nearbyBanks.length > 0 ? `
                  <div>
                    <strong>🏦 Blood Banks with Stock:</strong>
                    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
                      ${opt.nearbyBanks.slice(0, 3).map(bank => `
                        <div style="padding:0.3rem 0.6rem;background:#f3e5f5;border-radius:4px;font-size:0.8rem;">
                          ${bank.name} (${bank.distance}km, ${bank.availableUnits} units)
                        </div>
                      `).join('')}
                    </div>
                  </div>
                ` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
  </script>
</body>
</html>
